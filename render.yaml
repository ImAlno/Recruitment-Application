services:
  - type: web
    name: recruitment-backend
    runtime: node
    rootDir: backend
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate && npm run db:seed
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recruitment-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://recruitment-frontend.onrender.com
      - key: PORT
        value: 3000
  - type: web
    name: recruitment-frontend
    runtime: static
    plan: free  
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://recruitment-backend.onrender.com/api
databases:
  - name: recruitment-db
    plan: free
    region: frankfurt